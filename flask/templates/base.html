<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "管理" }}</title>

    <!-- Bootstrap Dark -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #222;
            color: #eee;
        }
        .container {
            max-width: 800px;
            padding-top: 20px;
        }
        .nav-link {
            color: #ccc !important;
        }
        .nav-link.active {
            color: #fff !important;
            font-weight: bold;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- ナビゲーション -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">Memory Admin</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link {% if 'items' in request.path %}active{% endif %}"
                       href="/items">Items</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if 'prompts' in request.path %}active{% endif %}"
                       href="/prompts">Prompts</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<div class="container">
    <h2 class="mb-4">{{ title }}</h2>

    {% block content %}{% endblock %}
</div>

</body>
</html>
