{% extends "base.html" %}
{% block content %}

<a href="/items/edit/0" class="btn btn-primary mb-3">＋ 新規追加</a>

<table class="table table-dark table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Label</th>
            <th>Tags</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
        <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.label }}</td>
            <td>{{ item.tags }}</td>
            <td>
                <a href="/items/edit/{{ item.id }}" class="btn btn-sm btn-secondary">編集</a>
                <a href="/items/delete/{{ item.id }}" class="btn btn-sm btn-danger">削除</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
