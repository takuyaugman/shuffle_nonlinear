{% extends "base.html" %}
{% block content %}

<form method="post" autocomplete="off" class="mb-3">

    <input type="text" name="fake" style="display:none" autocomplete="off">

    <div class="mb-3">
        <label class="form-label">Text</label>
        <input name="text" class="form-control" autocomplete="off"
               value="{{ prompt.text if prompt else '' }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Item Count</label>
        <input name="item_count" class="form-control" autocomplete="off"
               value="{{ prompt.item_count if prompt else '1' }}">
    </div>

    <button class="btn btn-primary">保存</button>
</form>

<a href="/prompts" class="btn btn-secondary">戻る</a>

{% endblock %}
